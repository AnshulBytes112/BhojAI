services:
  # ─── Backend API (Express + Prisma) ────────────────────────────────────────
  - type: web
    name: bhojai-api
    runtime: node
    region: oregon        # Change to: singapore / frankfurt / ohio as needed
    plan: free            # Upgrade to starter ($7/mo) for always-on
    rootDir: .            # Monorepo root
    buildCommand: npm install && npx prisma generate && npx nx build api
    startCommand: node dist/apps/api/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3333
      - key: DATABASE_URL
        sync: false       # Set this manually in Render dashboard (sensitive)
      - key: JWT_SECRET
        sync: false       # Set this manually in Render dashboard (sensitive)
      - key: FRONTEND_URL
        sync: false       # Set to your frontend Render URL after it deploys

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  - type: web
    name: bhojai-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npx nx build frontend
    startCommand: node apps/frontend/.next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false       # Set to your API Render URL + /api  e.g. https://bhojai-api.onrender.com/api
      - key: NEXT_PUBLIC_ENABLE_DEMO_AUTH
        value: "false"    # Set to "true" if you want demo PIN login fallback
